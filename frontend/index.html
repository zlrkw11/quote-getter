<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quote</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <nav>
      <a class="brand" href="index.html">Snapshot Getter</a>
      <div>
        <a href="index.html">Quote</a>
        <a href="http://127.0.0.1:8000/docs">API Docs</a>
        <a href="https://github.com/zlrkw11">zlrkw11</a>
      </div>
    </nav>
    <main>
      <h1>Snapshot Getter</h1>
      <p id="description">get a ticker's data snapshot from the US market</p>
      <form action="http://127.0.0.1:8000/quote" method="get" target="result">
        <input name="symbol" value="AAPL" required maxlength="10">
        <button>Get</button>
      </form>
      <iframe name="result"></iframe>
    </main>
  </body>
</html>
